<!DOCTYPE html>
<html>
<head>
    <title>UPOU AI Helpdesk</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        #chat-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px #ccc; }
        #chat-history { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
        .user { text-align: right; color: blue; }
        .bot { text-align: left; color: green; }
        .source-tag { font-size: 0.8em; color: gray; display: block; }
    </style>
</head>
<body>
    <div id="chat-container">
        <h2>UPOU About Helpdesk</h2>
        <div id="chat-history"></div>
        <div id="loading" style="display:none;">AI is thinking...</div>
        <input type="text" id="user-input" style="width:80%;" placeholder="Ask about UPOU...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
async function sendMessage() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            const loading = document.getElementById('loading');
            const question = input.value;

            if (!question) return;

            history.innerHTML += `<p class="user"><b>You:</b> ${question}</p>`;
            input.value = '';
            loading.style.display = 'block';

            try {
                const response = await fetch('https://ukwgddanub74pfw7ryjc3f77zm0fqjhq.lambda-url.us-east-1.on.aws/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ "question": question })
                });

                const data = await response.json();
                // Lambda Function URLs often wrap the response in a 'body' string
                const result = typeof data.body === 'string' ? JSON.parse(data.body) : data;

                history.innerHTML += `<p class="bot"><span class="source-tag">[Official Policy Source]</span><b>Bot:</b> ${result.answer}</p>`;
            } catch (error) {
                console.error("Connection Error:", error);
                history.innerHTML += `<p style="color:red;">Error connecting to helpdesk. Check console for details.</p>`;
            }
            
            loading.style.display = 'none';
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
